[experiment]
# 实验配置
total_requests = 1000
batch_size = 50
timeout_seconds = 30
max_retries = 3
seed = 42

# 硬件配置（自动检测）
cpu_cores = 8
memory_gb = 16
storage_gb = 460
gpu_available = true
gpu_type = apple_silicon

# 路径配置
data_dir = experiments/data
scripts_dir = experiments/scripts
results_dir = experiments/results
logs_dir = experiments/logs

# 模型配置
models = gpt-3.5-turbo,llama-3-8b,bert-base,sentence-bert
simulate_api = true
api_success_rate = 0.95
avg_latency_ms = 150
